#cloud-config
users:
  - name: workeruser
    groups: sudo
    shell: /bin/bash
    ssh_authorized_keys:
      - ${ssh_key}
    sudo: ["ALL=(ALL) NOPASSWD:ALL"]
  - name: firecracker
    uid: 1100
    system: true
    shell: /usr/sbin/nologin

ssh_pwauth: false

packages:
  - linux-image-virtual
  - curl
  - socat
  - nftables
  - iproute2
  - squashfs-tools
  - e2fsprogs
  - jq

write_files:
  - path: /etc/sysctl.d/99-firecracker.conf
    content: |
      net.ipv4.ip_forward=1
  - path: /opt/warlock/install-wrapper.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail

      echo "Downloading install-firecracker.sh from warlock repository..."
      
      # Download the full install script from GitHub
      curl -fsSL -o /tmp/install-firecracker.sh \
        https://raw.githubusercontent.com/TristanBlackwell/warlock/master/scripts/install-firecracker.sh
      
      chmod +x /tmp/install-firecracker.sh
      
      # Run the install script
      /tmp/install-firecracker.sh
      
      # Download and install Warlock binary
      echo "Installing Warlock from GitHub releases..."
      WARLOCK_LATEST=$(curl -fsSL https://api.github.com/repos/TristanBlackwell/warlock/releases/latest | grep -o '"tag_name": "[^"]*' | cut -d'"' -f4)
      curl -fsSL -o /tmp/warlock "https://github.com/TristanBlackwell/warlock/releases/download/$${WARLOCK_LATEST}/warlock-linux-x86_64"

      # Verify and install
      if [ -f /tmp/warlock ]; then
        chmod +x /tmp/warlock
        mv /tmp/warlock /usr/local/bin/warlock
        echo "Warlock $${WARLOCK_LATEST} installed successfully!"
      else
        echo "Failed to download Warlock"
        exit 1
      fi
  - path: /etc/systemd/system/warlock.service
    content: |
      [Unit]
      Description=Warlock Firecracker Control Plane
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      User=root
      WorkingDirectory=/opt/warlock
      EnvironmentFile=-/etc/warlock/environment
      Environment="RUST_LOG=info"
      Environment="FIRECRACKER_BIN=/usr/local/bin/firecracker"
      Environment="JAILER_BIN=/usr/local/bin/jailer"
      Environment="GATEWAY_URL=http://${gateway_ip}:8080"
      Environment="WORKER_ID=${hostname}"
      ExecStart=/usr/local/bin/warlock
      Restart=always
      RestartSec=10

      [Install]
      WantedBy=multi-user.target

runcmd:
  - [bash, /opt/warlock/install-wrapper.sh]
  - mkdir -p /etc/warlock
  - |
    WORKER_IP=$(ip -4 addr show eth1 2>/dev/null | grep -oP '(?<=inet\s)\d+(\.\d+){3}' | head -1)
    if [ -z "$WORKER_IP" ]; then
      WORKER_IP=$(ip -4 addr show eth0 | grep -oP '(?<=inet\s)\d+(\.\d+){3}' | head -1)
    fi
    echo "WORKER_IP=$WORKER_IP" > /etc/warlock/environment
  - systemctl daemon-reload
  - systemctl enable warlock
  - systemctl start warlock
