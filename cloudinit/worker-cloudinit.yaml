users:
  - name: workeruser
    groups: sudo
    shell: /bin/bash
    ssh_authorized_keys:
      - ${ssh_key}
    sudo: ["ALL=(ALL) NOPASSWD:ALL"]
  - name: firecracker
    uid: 1100
    system: true
    shell: /usr/sbin/nologin

ssh_pwauth: false

packages:
  - linux-image-virtual
  - curl
  - socat
  - nftables
  - iproute2

write_files:
  - path: /etc/sysctl.d/99-firecracker.conf
    content: |
      net.ipv4.ip_forward=1
  - path: /opt/warlock/install-firecracker.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail

      echo "Installing Firecracker and Warlock..."

      # Create directory structure
      mkdir -p /opt/firecracker /srv/jailer/vm-images /srv/jailer/vsock /etc/warlock/ssh

      # Download and install Firecracker
      FIRECRACKER_VERSION="v1.14.1"
      curl -fsSL https://github.com/firecracker-microvm/firecracker/releases/download/$${FIRECRACKER_VERSION}/firecracker-$${FIRECRACKER_VERSION}-x86_64.tgz | tar -xz
      mv release-$${FIRECRACKER_VERSION}-x86_64/firecracker-$${FIRECRACKER_VERSION}-x86_64 /usr/local/bin/firecracker
      mv release-$${FIRECRACKER_VERSION}-x86_64/jailer-$${FIRECRACKER_VERSION}-x86_64 /usr/local/bin/jailer
      rm -rf release-$${FIRECRACKER_VERSION}-x86_64
      chmod +x /usr/local/bin/firecracker /usr/local/bin/jailer

      # Download kernel and rootfs from Firecracker CI
      echo "Downloading kernel and rootfs (this may take a few minutes)..."
      curl -fsSL -o /opt/firecracker/vmlinux-6.1.155 \
        https://s3.amazonaws.com/spec.ccfc.min/firecracker-ci/v1.14/x86_64/vmlinux-6.1.155

      curl -fsSL -o /opt/firecracker/ubuntu-24.04.ext4 \
        https://s3.amazonaws.com/spec.ccfc.min/firecracker-ci/v1.14/x86_64/ubuntu-24.04.ext4

      # Create symlinks
      ln -sf vmlinux-6.1.155 /opt/firecracker/vmlinux
      ln -sf ubuntu-24.04.ext4 /opt/firecracker/rootfs.ext4

      # Set ownership
      chown -R firecracker:firecracker /srv/jailer

      # Enable IP forwarding
      sysctl -p /etc/sysctl.d/99-firecracker.conf

      # Set up nftables
      nft add table firecracker || true
      nft add chain firecracker postrouting { type nat hook postrouting priority 100 \; } || true
      nft add chain firecracker filter { type filter hook forward priority 0 \; } || true

      echo "Firecracker installation complete!"

      # Download and install Warlock
      echo "Installing Warlock from GitHub releases..."
      WARLOCK_LATEST=$(curl -fsSL https://api.github.com/repos/TristanBlackwell/warlock/releases/latest | grep -o '"tag_name": "[^"]*' | cut -d'"' -f4)
      curl -fsSL -o /tmp/warlock "https://github.com/TristanBlackwell/warlock/releases/download/$${WARLOCK_LATEST}/warlock-x86_64-unknown-linux-gnu"

      # Verify and install
      if [ -f /tmp/warlock ]; then
        chmod +x /tmp/warlock
        mv /tmp/warlock /usr/local/bin/warlock
        echo "Warlock $${WARLOCK_LATEST} installed successfully!"
      else
        echo "Failed to download Warlock"
        exit 1
      fi
  - path: /etc/systemd/system/warlock.service
    content: |
      [Unit]
      Description=Warlock Firecracker Control Plane
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      User=root
      WorkingDirectory=/opt/warlock
      Environment="RUST_LOG=info"
      Environment="FIRECRACKER_BIN=/usr/local/bin/firecracker"
      Environment="JAILER_BIN=/usr/local/bin/jailer"
      Environment="GATEWAY_URL=http://${gateway_ip}:8080"
      Environment="WORKER_ID=${hostname}"
      ExecStart=/usr/local/bin/warlock
      Restart=always
      RestartSec=10

      [Install]
      WantedBy=multi-user.target

runcmd:
  - [bash, /opt/warlock/install-firecracker.sh]
  - systemctl daemon-reload
  - systemctl enable warlock
  - systemctl start warlock
