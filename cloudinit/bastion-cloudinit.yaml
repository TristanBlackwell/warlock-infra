#cloud-config
users:
  - name: bastionuser
    groups: sudo
    shell: /bin/bash
    ssh_authorized_keys:
      - ${ssh_key}
    sudo: ["ALL=(ALL) NOPASSWD:ALL"]

ssh_pwauth: false

packages:
  - curl
  - jq
  - openssh-client

write_files:
  - path: /usr/local/bin/vm-ssh-proxy
    permissions: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail

      # Extract VM ID from SSH username (e.g., "vm-abc123" -> "abc123")
      VM_ID="$${USER#vm-}"

      # Query gateway for VM location
      API_URL="${gateway_api_url}"
      LOCATION=$(curl -sf "$API_URL/vm/$VM_ID/location" || {
          echo "Error: VM '$VM_ID' not found or unavailable" >&2
          echo "Please check that the VM exists and is running." >&2
          exit 1
      })

      # Parse JSON response
      WORKER_IP=$(echo "$LOCATION" | jq -r '.worker_ip')
      PORT=$(echo "$LOCATION" | jq -r '.port // 2222')

      # Validate response
      if [ -z "$WORKER_IP" ] || [ "$WORKER_IP" = "null" ]; then
          echo "Error: Could not determine VM location" >&2
          exit 1
      fi

      # Proxy SSH connection to worker
      exec ssh -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o LogLevel=ERROR \
              "vm-$VM_ID@$WORKER_IP" -p "$PORT"
  
  - path: /etc/nsswitch.conf
    content: |
      # /etc/nsswitch.conf - Name Service Switch configuration
      # 
      # For VM users (vm-*), the 'warlock' NSS module provides dynamic user resolution
      passwd:         files warlock systemd
      group:          files systemd
      shadow:         files
      gshadow:        files
      
      hosts:          files dns
      networks:       files
      
      protocols:      db files
      services:       db files
      ethers:         db files
      rpc:            db files
      
      netgroup:       nis

  - path: /etc/ssh/vm-authorized-keys
    permissions: "0644"
    content: |
      ${ssh_key}

  - path: /etc/pam.d/sshd-vm
    content: |
      # PAM configuration for VM users (minimal checks)
      # VM users are dynamically created by NSS, no home directory needed
      auth       required     pam_permit.so
      account    required     pam_permit.so
      session    required     pam_permit.so

  - path: /etc/shells.d/vm-ssh-proxy
    content: |
      /usr/local/bin/vm-ssh-proxy

  - path: /etc/ssh/sshd_config.d/99-vm-proxy.conf
    content: |
      # Route VM connections through proxy
      Match User vm-*
          # Execute proxy script instead of shell
          ForceCommand /usr/local/bin/vm-ssh-proxy
          
          # Allow PTY for interactive sessions
          PermitTTY yes
          
          # Shared authorized keys for all VM users (NSS handles user existence)
          AuthorizedKeysFile /etc/ssh/vm-authorized-keys
          
          # Disable password auth
          PasswordAuthentication no
          
          # Use custom PAM config that doesn't require home directory
          AuthenticationMethods publickey
  - path: /etc/ssh/sshd_config.d/01-disable-root.conf
    content: |
      PermitRootLogin no
      PasswordAuthentication no

runcmd:
  # Install Warlock NSS module for dynamic VM user resolution
  - |
    NSS_VERSION="v0.1.0"
    NSS_URL="https://github.com/TristanBlackwell/warlock-nss/releases/download/$NSS_VERSION/libnss_warlock.so.2"
    
    echo "Installing Warlock NSS module..."
    curl -fsSL "$NSS_URL" -o /lib/x86_64-linux-gnu/libnss_warlock.so.2
    chmod 644 /lib/x86_64-linux-gnu/libnss_warlock.so.2
    
    # Add VM proxy script to valid shells
    echo "/usr/local/bin/vm-ssh-proxy" >> /etc/shells
    
    # Verify NSS module is working
    echo "Testing NSS module..."
    if getent passwd vm-00000000-0000-4000-8000-000000000000 | grep -q "vm-00000000"; then
      echo "[OK] NSS module installed successfully"
    else
      echo "WARNING: NSS module may not be functioning correctly" >&2
    fi
  
  - systemctl restart ssh
